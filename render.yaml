services:
  - type: web
    name: essentia-rewards-hub
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: essentia-db
          property: connectionString

databases:
  - name: essentia-db
    plan: free
